<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta
      property="og:title"
      content="音樂庫 - BABYMONSTER臺灣首站"
    /><meta property="og:description" content="音樂庫 - BABYMONSTER臺灣首站"
    /><meta name="description" content="音樂庫 - BABYMONSTER臺灣首站"
    /><link rel="icon" href="./images/icon.png" type="image/png">
<meta property="og:image" content="https://babymonster.tw/images/icon.png" />
    <meta property="og:url" content="https://babymonster.tw/pc-music" /><meta
  ><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音樂庫 - BABYMONSTER臺灣首站</title>

    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 環境光暈背景 -->
    <div class="aurora" aria-hidden="true"></div>
    <!-- 動態星光背景 -->
    <div class="star-bg" id="star-bg"></div>

    <!-- 固定頂部選單 (來自 announced.html) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="https://babymonster.tw">
                <img src="./images/logo.png" alt="logo" style="height:30px; margin-right:10px;">
                寶怪台灣首站
            </a>

            <!-- 漢堡按鈕 -->
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="切換選單">
                <span class="toggler-icon"></span>
                <span class="toggler-icon"></span>
                <span class="toggler-icon"></span>
            </button>

            <!-- 左邊選單 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>

                <!-- 右邊選單 -->
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw">主頁</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/announced">重要公告</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/links">相關連結</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/about">關於我們</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/concert-info/">演唱會</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/pc-music">音樂庫</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 左側分類列表 -->
    <aside class="category-sidebar" id="category-sidebar">
        <h3>專輯分類</h3>
        <ul id="category-list">
            <li class="active" data-group="全部 (All)"><span class="cat-dot"></span><span class="cat-name">全部</span><span class="cat-count" data-count></span></li>
            <li data-group="춤 (CHOOM)"><span class="cat-dot"></span><span class="cat-name">춤 (CHOOM)</span><span class="cat-count" data-count></span></li>
            <li data-group="DRIP"><span class="cat-dot"></span><span class="cat-name">DRIP</span><span class="cat-count" data-count></span></li>
            <li data-group="WE GO UP"><span class="cat-dot"></span><span class="cat-name">WE GO UP</span><span class="cat-count" data-count></span></li>
            <li data-group="BABYMON7ER"><span class="cat-dot"></span><span class="cat-name">BABYMON7ER</span><span class="cat-count" data-count></span></li>
            <li data-group="單曲"><span class="cat-dot"></span><span class="cat-name">單曲</span><span class="cat-count" data-count></span></li>
        </ul>
    </aside>

    <!-- 主舞台 -->
    <main class="stage">
        <header class="stage-head">
            <p class="eyebrow">BABYMONSTER · MUSIC LIBRARY</p>
            <h1 class="stage-title">音樂庫</h1>
        </header>

        <div class="scene" id="scene">
            <div class="stage-floor" aria-hidden="true"></div>
            <div class="carousel" id="carousel">
                <!-- CD 會由 JS 動態生成 -->
            </div>
        </div>

        <div class="now-playing" id="now-playing">
            <span class="np-label">現正聚焦</span>
            <span class="np-title" id="np-title">—</span>
            <a class="np-link" id="np-link" href="#" target="_blank" rel="noopener">在 Spotify 收聽 ▸</a>
        </div>

        <div class="controls">
            <div class="control-row">
                <button class="spin-btn" id="spin-btn" type="button" aria-label="切換自動旋轉" title="自動旋轉">❚❚</button>
                <input type="range" id="slider" min="-180" max="180" value="0" aria-label="旋轉輪盤">
            </div>
            <div class="instruction">拖曳唱片或滑桿來旋轉　·　點擊唱片在 Spotify 收聽</div>
        </div>
    </main>

    <!-- 版權聲明 -->
    <footer>
        Copyright © 2025–2026 BABYMONSTER臺灣首站 All Rights Reserved.
    </footer>

    <!-- 引入 Bootstrap JS (導覽列漢堡選單需要) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
