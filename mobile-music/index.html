<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta
      property="og:title"
      content="音樂庫 - BABYMONSTER臺灣首站"
    /><meta property="og:description" content="音樂庫 - BABYMONSTER臺灣首站"
    /><meta name="description" content="音樂庫 - BABYMONSTER臺灣首站"
    /><link rel="icon" href="./images/icon.png" type="image/png">
<meta property="og:image" content="https://babymonster.tw/images/icon.png" />
    <meta property="og:url" content="https://babymonster.tw/mobile-music" /><meta
  ><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#02050a">
  <title>音樂庫 - BABYMONSTER臺灣首站</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 隨專輯封面變色的環境光暈 -->
    <div class="ambient" aria-hidden="true">
        <div class="amb-layer amb-a"></div>
        <div class="amb-layer amb-b"></div>
        <div class="amb-veil"></div>
    </div>
    <!-- 動態星光背景 -->
    <div class="star-bg" id="star-bg"></div>

    <!-- 固定頂部選單 (來自 announced.html) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="https://babymonster.tw">
                <img src="./images/logo.png" alt="logo" style="height:30px; margin-right:10px;">
                寶怪台灣首站
            </a>

            <!-- 漢堡按鈕 -->
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="切換選單">
                <span class="toggler-icon"></span>
                <span class="toggler-icon"></span>
                <span class="toggler-icon"></span>
            </button>

            <!-- 左邊選單 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>

                <!-- 右邊選單 -->
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw">主頁</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/announced">重要公告</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/links">相關連結</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/about">關於我們</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/concert-info/">演唱會</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://babymonster.tw/mobile-music">音樂庫</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 黑膠唱片播放器 -->
    <main class="player">
        <header class="player-head">
            <p class="eyebrow">BABYMONSTER · MUSIC LIBRARY</p>
            <h1 class="player-title">音樂庫</h1>
        </header>

        <!-- 分類篩選 (水平捲動) -->
        <div class="filter-bar" id="filter-bar">
            <button class="chip active" type="button" data-group="全部 (All)"><span class="chip-name">全部</span><span class="chip-count"></span></button>
            <button class="chip" type="button" data-group="춤 (CHOOM)"><span class="chip-name">춤 (CHOOM)</span><span class="chip-count"></span></button>
            <button class="chip" type="button" data-group="DRIP"><span class="chip-name">DRIP</span><span class="chip-count"></span></button>
            <button class="chip" type="button" data-group="WE GO UP"><span class="chip-name">WE GO UP</span><span class="chip-count"></span></button>
            <button class="chip" type="button" data-group="BABYMON7ER"><span class="chip-name">BABYMON7ER</span><span class="chip-count"></span></button>
            <button class="chip" type="button" data-group="單曲"><span class="chip-name">單曲</span><span class="chip-count"></span></button>
        </div>

        <!-- 封面流 (黑膠唱片轉盤) -->
        <section class="flow-wrap">
            <div class="flow" id="flow">
                <!-- 唱片由 JS 動態生成 -->
            </div>
        </section>

        <!-- 現正聚焦資訊 + 播放鍵 -->
        <div class="stage-info" id="stage-info">
            <span class="si-group" id="si-group">—</span>
            <h2 class="si-title" id="si-title">—</h2>
            <a class="play-fab" id="play-fab" href="#" target="_blank" rel="noopener" aria-label="在 Spotify 收聽">
                <span class="play-ico">▶</span>
            </a>
            <p class="swipe-hint">左右滑動瀏覽　·　點擊唱片或播放鍵收聽</p>
        </div>
    </main>

    <!-- 版權聲明 -->
    <footer>
        Copyright © 2025–2026 BABYMONSTER臺灣首站 All Rights Reserved.
    </footer>

    <!-- 引入 Bootstrap JS (導覽列漢堡選單需要) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
